<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Travels by HL{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#FFF8EC;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#FFF8EC;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(26,43,95,0.12);">
          <!-- Header -->
          <tr>
            <td style="background-color:#1A2B5F;padding:0;">
              <div style="height:4px;background-color:#F5A623;"></div>
              <div style="padding:28px 32px;text-align:center;">
                <img src="{{ logo_url }}" alt="Smart Travels by HL" width="80" height="80" style="display:block;margin:0 auto 12px;object-fit:contain;">
                <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;">Smart Travels by HL</h1>
                <p style="margin:8px 0 0;color:#F5A623;font-size:14px;font-style:italic;">{{ tagline }}</p>
              </div>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#1A2B5F;padding:24px 32px;text-align:center;">
              <div style="height:2px;background-color:#6B3FA0;margin-bottom:16px;"></div>
              <p style="margin:0 0 8px;color:#F5A623;font-size:13px;font-weight:600;">Smart Travels by HL</p>
              <p style="margin:0 0 4px;color:#ffffff;font-size:12px;">{{ phone }} | {{ email }}</p>
              <p style="margin:0;color:#ffffff;font-size:12px;opacity:0.85;">{{ address }}</p>
              <p style="margin:16px 0 0;color:#ffffff;font-size:11px;opacity:0.6;">&copy; {{ year }} Smart Travels by HL. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
