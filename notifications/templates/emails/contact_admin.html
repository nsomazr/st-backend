{% extends "emails/base.html" %}

{% block title %}New Contact Enquiry{% endblock %}

{% block content %}
<h2 style="margin:0 0 16px;color:#1A2B5F;font-size:20px;">New Contact Enquiry</h2>
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#FFF8EC;border-radius:12px;border-left:4px solid #6B3FA0;">
  <tr>
    <td style="padding:20px;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="4">
        <tr><td style="color:#666;font-size:14px;width:30%;">Name</td><td style="color:#333;font-size:14px;">{{ name }}</td></tr>
        <tr><td style="color:#666;font-size:14px;">Email</td><td style="color:#333;font-size:14px;">{{ email }}</td></tr>
        {% if phone %}<tr><td style="color:#666;font-size:14px;">Phone</td><td style="color:#333;font-size:14px;">{{ phone }}</td></tr>{% endif %}
      </table>
      <p style="margin:16px 0 8px;color:#666;font-size:13px;font-weight:600;">Message:</p>
      <p style="margin:0;color:#333;font-size:14px;line-height:1.6;">{{ message }}</p>
    </td>
  </tr>
</table>
{% endblock %}
